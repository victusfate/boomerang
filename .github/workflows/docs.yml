name: Update REST API docs

on:
  pull_request:
    branches: [main]
    paths:
      - platform-worker/src/apiRoutes.ts

# Bot pushes back to the PR's head branch, not main.
permissions:
  contents: write

jobs:
  update-docs:
    # Skip bot-authored commits — path filter alone isn't enough here because
    # the bot's push touches apiRoutes.ts's sibling directory, not the file
    # itself, but an extra guard is cheap.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate REST API docs
        run: node --experimental-strip-types scripts/gen-api-docs.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api-rest.md
          git diff --staged --quiet && echo "docs unchanged" && exit 0
          git commit -m "docs: regenerate api-rest.md"
          git push origin HEAD:${{ github.head_ref }}
