name: Publish API docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for GitHub Pages deployment via Actions
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs if a new push lands
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            platform-worker/package-lock.json
            news-feed/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix platform-worker
          npm ci --prefix news-feed

      - name: Generate docs
        run: npm run docs:api

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/api

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
