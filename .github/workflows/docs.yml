name: Update REST API docs

on:
  push:
    branches: [main]
    paths:
      - platform-worker/src/apiRoutes.ts
  workflow_dispatch:

# Path filter (apiRoutes.ts only) means the bot's commit to docs/api-rest.md
# never re-triggers this workflow — no loop guard needed.
permissions:
  contents: write

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate REST API docs
        run: node --experimental-strip-types scripts/gen-api-docs.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api-rest.md
          git diff --staged --quiet && echo "docs unchanged, nothing to commit" && exit 0
          git commit -m "docs: regenerate api-rest.md"
          git push
