name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build news feed
        working-directory: news-feed
        env:
          GITHUB_PAGES: 'true'
          VITE_RSS_WORKER_URL: ${{ vars.VITE_RSS_WORKER_URL }}
        run: |
          if [ -z "$VITE_RSS_WORKER_URL" ]; then
            echo "::warning title=RSS Worker URL missing::Set repository variable VITE_RSS_WORKER_URL to your Worker origin (no trailing slash), e.g. https://boomerang-rss.boomerang.workers.dev — then redeploy. Without it the app uses CORS proxies only, so Cloudflare shows 0 requests."
          fi
          npm ci
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./news-feed/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
