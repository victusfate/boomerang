name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build news feed
        working-directory: news-feed
        env:
          GITHUB_PAGES: 'true'
          VITE_RSS_WORKER_URL: ${{ vars.VITE_RSS_WORKER_URL }}
        run: |
          npm ci
          npm run build

      - name: Upload artifact
        # Only upload on push to main or manual dispatch — not on PRs
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./news-feed/dist

  deploy:
    # Only deploy on push to main or manual dispatch
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
