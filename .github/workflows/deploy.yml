name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build news feed
        working-directory: news-feed
        env:
          GITHUB_PAGES: 'true'
          # Baked into the JS at build time — must be set or production has no Worker URL (no bundle/og requests).
          VITE_RSS_WORKER_URL: ${{ vars.VITE_RSS_WORKER_URL }}
        run: |
          if [ -z "$VITE_RSS_WORKER_URL" ]; then
            echo "::error title=VITE_RSS_WORKER_URL missing::Add a GitHub repository variable: Settings → Secrets and variables → Actions → Variables → New repository variable. Name: VITE_RSS_WORKER_URL. Value: your Worker origin with no trailing slash (e.g. https://boomerang-rss.<account>.workers.dev). Then re-run this workflow."
            exit 1
          fi
          npm ci
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./news-feed/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
