name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build idea board (root app)
        run: npm ci && npm run build

      - name: Build news feed (PWA)
        working-directory: news-feed
        env:
          GITHUB_PAGES: 'true'
        run: npm ci && npm run build

  typecheck-worker:
    name: Typecheck rss-worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and typecheck
        working-directory: rss-worker
        run: npm ci && npm run typecheck
