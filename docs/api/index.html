<!DOCTYPE html>

  <style>
*, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2rem 1.5rem;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 1rem;
    line-height: 1.65;
    color: #1a1a1a;
    background: #f9f9f9;
  }
  .container {
    max-width: 860px;
    margin: 0 auto;
    background: #fff;
    padding: 2.5rem 3rem;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  h1 { font-size: 1.9rem; margin-top: 0; color: #111; }
  h2 { font-size: 1.4rem; margin-top: 2rem; color: #222; border-bottom: 1px solid #e5e5e5; padding-bottom: 0.25rem; }

  code {
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 0.875em;
    background: #f3f4f6;
    padding: 0.15em 0.35em;
    border-radius: 3px;
  }
  pre {
    background: #f3f4f6;
    padding: 1rem;
    border-radius: 5px;
    overflow-x: auto;
  }
  pre code { background: none; padding: 0; }
  blockquote {
    margin: 1rem 0;
    padding: 0.6rem 1rem;
    border-left: 3px solid #d1d5db;
    color: #555;
    background: #f8f8f8;
    border-radius: 0 4px 4px 0;
  }
  hr { border: none; border-top: 1px solid #e5e5e5; margin: 2rem 0; }
  a { color: #2563eb; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .meta { color: #6b7280; font-size: 0.9rem; margin-top: 0.25rem; }
    .links { list-style: none; padding: 0; margin: 1.5rem 0 0; }
    .links li { margin: 0.75rem 0; }
    .links a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.05rem;
      font-weight: 500;
    }
    .links .desc { font-size: 0.875rem; color: #6b7280; margin-left: 0.25rem; font-weight: 400; }
